spring:
  application:
    name: genesys-connect-hub
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/genesyshub}
    username: ${DB_USERNAME:genesys}
    password: ${DB_PASSWORD:genesys}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

genesys:
  client-id: ${GENESYS_CLIENT_ID}
  client-secret: ${GENESYS_CLIENT_SECRET}
  region: ${GENESYS_REGION:mypurecloud.com}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5432/genesyshub_test
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true

genesys:
  client-id: test-client-id
  client-secret: test-client-secret
  region: mypurecloud.com

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/genesyshub
    username: ${DB_USERNAME:genesys}
    password: ${DB_PASSWORD:genesys}
