version: '3.9'

networks:
  genesys-net:
    driver: bridge

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: genesyshub-postgres
    env_file: .env
    environment:
      POSTGRES_DB: genesyshub
      POSTGRES_USER: ${DB_USERNAME:-genesys}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-genesys}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - genesys-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-genesys} -d genesyshub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genesyshub-app
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: ${DB_USERNAME:-genesys}
      DB_PASSWORD: ${DB_PASSWORD:-genesys}
      GENESYS_CLIENT_ID: ${GENESYS_CLIENT_ID}
      GENESYS_CLIENT_SECRET: ${GENESYS_CLIENT_SECRET}
      GENESYS_REGION: ${GENESYS_REGION:-mypurecloud.com}
    ports:
      - "8080:8080"
    networks:
      - genesys-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
